name: Deploy Redirect to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build redirect page
        run: |
          mkdir -p redirect-site
          cat > redirect-site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=https://hirokihamaguchi.github.io/latexpages/latexlint/">
              <title>LaTeX Lint moved</title>
              <script>
                window.location.replace("https://hirokihamaguchi.github.io/latexpages/latexlint/" + window.location.hash);
              </script>
            </head>
            <body>
              <p>
                LaTeX Lint has moved to
                <a href="https://hirokihamaguchi.github.io/latexpages/latexlint/">https://hirokihamaguchi.github.io/latexpages/latexlint/</a>.
              </p>
            </body>
          </html>
          EOF
          cp redirect-site/index.html redirect-site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./redirect-site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: redirect
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
